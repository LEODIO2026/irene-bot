<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아이린 — 트레이드 어시스턴트</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d2e;
    --surface2: #232639;
    --border: #2e3148;
    --accent: #818cf8;
    --accent2: #a78bfa;
    --buy: #34d399;
    --sell: #f87171;
    --text: #e2e8f0;
    --muted: #8892a4;
    --gold: #fbbf24;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', 'Noto Sans KR', sans-serif;
    font-size: 14px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── 헤더 ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }
  header a {
    color: var(--muted);
    text-decoration: none;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: color .2s;
  }
  header a:hover { color: var(--text); }
  .header-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--accent2);
    flex: 1;
  }
  .header-badge {
    font-size: 11px;
    background: rgba(129,140,248,.15);
    color: var(--accent);
    padding: 3px 8px;
    border-radius: 20px;
    border: 1px solid rgba(129,140,248,.3);
  }

  /* ── 메인 레이아웃 ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── 채팅 패널 ── */
  .chat-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    min-width: 0;
  }
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .chat-messages::-webkit-scrollbar { width: 6px; }
  .chat-messages::-webkit-scrollbar-track { background: transparent; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .msg {
    display: flex;
    gap: 10px;
    max-width: 85%;
  }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.assistant { align-self: flex-start; }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
  }
  .msg.user .avatar { background: rgba(129,140,248,.2); color: var(--accent); }
  .msg.assistant .avatar { background: rgba(167,139,250,.2); color: var(--accent2); }

  .bubble {
    padding: 12px 16px;
    border-radius: 16px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.user .bubble {
    background: rgba(129,140,248,.15);
    border: 1px solid rgba(129,140,248,.25);
    border-bottom-right-radius: 4px;
  }
  .msg.assistant .bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  /* 마크다운-스타일 강조 */
  .bubble strong { color: var(--gold); }
  .bubble em { color: var(--accent2); font-style: normal; }

  /* 이미지 첨부 프리뷰 */
  .img-preview {
    margin-bottom: 8px;
    max-width: 200px;
    max-height: 150px;
    border-radius: 8px;
    border: 1px solid var(--border);
    object-fit: contain;
  }

  /* 로딩 도트 */
  .typing-dots { display: flex; gap: 4px; align-items: center; padding: 8px 0; }
  .typing-dots span {
    width: 7px; height: 7px;
    background: var(--muted);
    border-radius: 50%;
    animation: bounce .6s infinite alternate;
  }
  .typing-dots span:nth-child(2) { animation-delay: .2s; }
  .typing-dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce { to { transform: translateY(-5px); opacity: .5; } }

  /* ── 입력 영역 ── */
  .chat-input-area {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  .input-wrap {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: border-color .2s;
  }
  .input-wrap:focus-within { border-color: var(--accent); }

  .img-attach-preview {
    padding: 8px 12px 0;
    display: none;
  }
  .img-attach-preview img {
    height: 60px;
    border-radius: 6px;
    border: 1px solid var(--border);
    object-fit: cover;
  }
  .img-attach-preview .remove-img {
    margin-left: 6px;
    cursor: pointer;
    color: var(--sell);
    font-size: 12px;
    vertical-align: top;
  }

  #chatInput {
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    padding: 12px 14px;
    font-size: 14px;
    resize: none;
    min-height: 44px;
    max-height: 160px;
    font-family: inherit;
    line-height: 1.5;
  }
  #chatInput::placeholder { color: var(--muted); }

  .input-actions {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 10px 8px;
  }
  .input-actions-left { display: flex; gap: 6px; }

  .icon-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 5px 8px;
    border-radius: 6px;
    font-size: 16px;
    transition: color .2s, background .2s;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .icon-btn:hover { color: var(--text); background: rgba(255,255,255,.05); }
  .icon-btn span { font-size: 12px; }
  #imgInput { display: none; }

  .send-btn {
    background: var(--accent);
    border: none;
    color: #fff;
    padding: 0 18px;
    height: 44px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: background .2s, transform .1s;
    flex-shrink: 0;
  }
  .send-btn:hover { background: var(--accent2); }
  .send-btn:active { transform: scale(.97); }
  .send-btn:disabled { background: var(--border); cursor: not-allowed; }

  /* ── 오른쪽 제어 패널 ── */
  .ctrl-panel {
    width: 340px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    background: var(--surface);
  }
  .ctrl-panel::-webkit-scrollbar { width: 4px; }
  .ctrl-panel::-webkit-scrollbar-thumb { background: var(--border); }

  .ctrl-section {
    padding: 18px;
    border-bottom: 1px solid var(--border);
  }
  .ctrl-section:last-child { border-bottom: none; }
  .ctrl-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 12px;
  }

  /* 심볼 선택 */
  .symbol-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }
  .sym-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 7px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    text-align: center;
    transition: all .2s;
  }
  .sym-btn:hover { border-color: var(--accent); color: var(--accent); }
  .sym-btn.active { background: rgba(129,140,248,.15); border-color: var(--accent); color: var(--accent); }

  /* 방향 선택 */
  .side-btns { display: flex; gap: 8px; }
  .side-btn {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    cursor: pointer;
    font-size: 13px;
    font-weight: 700;
    text-align: center;
    transition: all .2s;
    background: transparent;
    color: var(--muted);
  }
  .side-btn.buy:hover, .side-btn.buy.active {
    background: rgba(52,211,153,.15);
    border-color: var(--buy);
    color: var(--buy);
  }
  .side-btn.sell:hover, .side-btn.sell.active {
    background: rgba(248,113,113,.15);
    border-color: var(--sell);
    color: var(--sell);
  }

  /* SL/TP 입력 */
  .sltp-grid { display: flex; flex-direction: column; gap: 10px; }
  .sltp-row { display: flex; flex-direction: column; gap: 4px; }
  .sltp-row label {
    font-size: 11px;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: .5px;
  }
  .sltp-row label span { font-size: 10px; margin-left: 4px; }
  .sltp-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 9px 12px;
    font-size: 14px;
    font-family: 'JetBrains Mono', monospace;
    outline: none;
    width: 100%;
    transition: border-color .2s;
  }
  .sltp-input:focus { border-color: var(--accent); }
  .sltp-input.sl-active { border-color: var(--sell); }
  .sltp-input.tp-active { border-color: var(--buy); }

  /* 현재 포지션 */
  .pos-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 13px;
  }
  .pos-card .pos-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .pos-badge {
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 4px;
  }
  .pos-badge.long { background: rgba(52,211,153,.2); color: var(--buy); }
  .pos-badge.short { background: rgba(248,113,113,.2); color: var(--sell); }
  .pos-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 3px 0;
    font-size: 12px;
  }
  .pos-row .key { color: var(--muted); }
  .pos-row .val { font-weight: 600; font-family: monospace; }
  .pos-pnl.pos { color: var(--buy); }
  .pos-pnl.neg { color: var(--sell); }
  .no-pos { color: var(--muted); font-size: 12px; text-align: center; padding: 8px 0; }

  /* 실행 버튼 */
  .exec-btn {
    width: 100%;
    padding: 13px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: .5px;
    transition: all .2s;
    margin-bottom: 8px;
  }
  .exec-btn.buy-btn {
    background: linear-gradient(135deg, #059669, #34d399);
    color: #fff;
  }
  .exec-btn.sell-btn {
    background: linear-gradient(135deg, #dc2626, #f87171);
    color: #fff;
  }
  .exec-btn:hover { opacity: .88; transform: translateY(-1px); }
  .exec-btn:active { transform: translateY(0); }
  .exec-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; transform: none; }

  .close-btn {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: all .2s;
  }
  .close-btn:hover { border-color: var(--sell); color: var(--sell); background: rgba(248,113,113,.05); }

  /* 리셋 버튼 */
  .reset-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 11px;
    padding: 4px 8px;
    border-radius: 6px;
    transition: all .2s;
  }
  .reset-btn:hover { color: var(--sell); background: rgba(248,113,113,.08); }

  /* 토스트 알림 */
  #toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 13px;
    opacity: 0;
    transition: all .3s;
    z-index: 999;
    max-width: 340px;
    text-align: center;
    pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.success { border-color: var(--buy); color: var(--buy); }
  #toast.error { border-color: var(--sell); color: var(--sell); }

  /* 반응형 */
  @media (max-width: 760px) {
    .main { flex-direction: column; }
    .ctrl-panel { width: 100%; border-top: 1px solid var(--border); max-height: 50vh; }
    .chat-panel { min-height: 50vh; }
  }
</style>
</head>
<body>

<header>
  <a href="/dashboard">← 대시보드</a>
  <div class="header-title">아이린 트레이드 어시스턴트</div>
  <div class="header-badge">코어 계정</div>
  <button class="reset-btn" onclick="resetSession()">대화 초기화</button>
</header>

<div class="main">

  <!-- ── 채팅 패널 ── -->
  <div class="chat-panel">
    <div class="chat-messages" id="chatMessages">
      <!-- 환영 메시지 -->
      <div class="msg assistant">
        <div class="avatar">아</div>
        <div class="bubble">안녕하세요. ICT 기반 트레이드 어시스턴트 아이린입니다.

차트 이미지를 업로드하거나, 현재 시장 상황을 설명해 주세요. 함께 진입 자리를 분석하겠습니다.

분석 흐름:
<strong>1. Kill Zone 확인</strong> → <strong>2. 1D BOS/MSS</strong> → <strong>3. 200EMA</strong> → <strong>4. 4H 모멘텀</strong> → <strong>5. 15m 스윕</strong> → <strong>6. FVG/OB 진입 자리</strong></div>
      </div>
    </div>

    <div class="chat-input-area">
      <div class="input-row">
        <div class="input-wrap">
          <div class="img-attach-preview" id="imgPreviewBox">
            <img id="imgPreviewThumb" src="" alt="">
            <span class="remove-img" onclick="removeImage()">✕ 제거</span>
          </div>
          <textarea id="chatInput" rows="1" placeholder="시장 분석 또는 차트 설명을 입력하세요... (Shift+Enter: 줄바꿈)"
            onkeydown="handleKeydown(event)" oninput="autoResize(this)"></textarea>
          <div class="input-actions">
            <div class="input-actions-left">
              <button class="icon-btn" onclick="document.getElementById('imgInput').click()" title="차트 이미지 업로드">
                📷 <span>차트</span>
              </button>
              <input type="file" id="imgInput" accept="image/*" onchange="handleImageSelect(event)">
            </div>
            <div style="font-size:11px;color:var(--muted)" id="selectedSymbolLabel">BTC/USDT</div>
          </div>
        </div>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">전송</button>
      </div>
    </div>
  </div>

  <!-- ── 제어 패널 ── -->
  <div class="ctrl-panel">

    <!-- 심볼 선택 -->
    <div class="ctrl-section">
      <div class="ctrl-label">심볼 선택</div>
      <div class="symbol-grid" id="symbolGrid">
        <button class="sym-btn active" data-sym="BTC/USDT" onclick="selectSymbol(this)">BTC</button>
        <button class="sym-btn" data-sym="ETH/USDT" onclick="selectSymbol(this)">ETH</button>
        <button class="sym-btn" data-sym="SOL/USDT" onclick="selectSymbol(this)">SOL</button>
        <button class="sym-btn" data-sym="XRP/USDT" onclick="selectSymbol(this)">XRP</button>
        <button class="sym-btn" data-sym="BNB/USDT" onclick="selectSymbol(this)">BNB</button>
      </div>
    </div>

    <!-- 포지션 현황 -->
    <div class="ctrl-section">
      <div class="ctrl-label" style="display:flex;justify-content:space-between">
        <span>현재 포지션</span>
        <span style="cursor:pointer;font-size:12px" onclick="refreshPosition()" title="새로고침">↻</span>
      </div>
      <div id="positionDisplay">
        <div class="no-pos">포지션 없음</div>
      </div>
    </div>

    <!-- 방향 선택 -->
    <div class="ctrl-section">
      <div class="ctrl-label">진입 방향</div>
      <div class="side-btns">
        <button class="side-btn buy" id="btnBuy" onclick="selectSide('buy')">▲ 롱 (매수)</button>
        <button class="side-btn sell" id="btnSell" onclick="selectSide('sell')">▼ 숏 (매도)</button>
      </div>
    </div>

    <!-- SL/TP -->
    <div class="ctrl-section">
      <div class="ctrl-label" style="display:flex;justify-content:space-between">
        <span>손절 / 익절 설정</span>
        <span style="font-size:10px;color:var(--accent);cursor:default" id="suggestionNote"></span>
      </div>
      <div class="sltp-grid">
        <div class="sltp-row">
          <label>손절 (SL) <span style="color:var(--sell)">▼</span></label>
          <input type="number" class="sltp-input" id="slInput" placeholder="0.00" step="any">
        </div>
        <div class="sltp-row">
          <label>익절 (TP) <span style="color:var(--buy)">▲</span></label>
          <input type="number" class="sltp-input" id="tpInput" placeholder="0.00" step="any">
        </div>
        <div class="sltp-row" id="rrDisplay" style="display:none">
          <div style="font-size:12px;color:var(--muted);text-align:center;padding:4px">
            RR 비율: <strong id="rrRatio" style="color:var(--accent)">—</strong>
          </div>
        </div>
      </div>
    </div>

    <!-- 실행 버튼 -->
    <div class="ctrl-section">
      <button class="exec-btn buy-btn" id="execBtn" onclick="executeTrade()" disabled>
        거래 실행 (코어 계정)
      </button>
      <button class="close-btn" id="closeBtn" onclick="closePosition()" style="display:none">
        포지션 청산
      </button>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
const SESSION_ID = 'sess_' + Date.now();
const PASSPHRASE = 'irene_secret';

let selectedSymbol = 'BTC/USDT';
let selectedSide = null;
let attachedImage = null;  // { b64, mime }
let hasPosition = false;

// ── 심볼 선택 ───────────────────────────────────────────
function selectSymbol(btn) {
  document.querySelectorAll('.sym-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedSymbol = btn.dataset.sym;
  document.getElementById('selectedSymbolLabel').textContent = selectedSymbol;
  refreshPosition();
}

// ── 방향 선택 ────────────────────────────────────────────
function selectSide(side) {
  selectedSide = side;
  document.getElementById('btnBuy').classList.toggle('active', side === 'buy');
  document.getElementById('btnSell').classList.toggle('active', side === 'sell');
  updateExecBtn();
}

// ── SL/TP 입력 → RR 계산 ─────────────────────────────────
document.getElementById('slInput').addEventListener('input', updateRR);
document.getElementById('tpInput').addEventListener('input', updateRR);

function updateRR() {
  const sl = parseFloat(document.getElementById('slInput').value);
  const tp = parseFloat(document.getElementById('tpInput').value);
  if (sl && tp && selectedSide) {
    // 간단한 RR (진입가를 모르니 SL-TP 거리 비율로 표시)
    document.getElementById('rrDisplay').style.display = 'block';
    const dist = Math.abs(tp - sl);
    if (dist > 0) {
      document.getElementById('rrRatio').textContent = `설정됨 ✓`;
    }
  }
  updateExecBtn();
}

function updateExecBtn() {
  const sl = document.getElementById('slInput').value;
  const tp = document.getElementById('tpInput').value;
  const btn = document.getElementById('execBtn');
  const ok = sl && tp && selectedSide;
  btn.disabled = !ok;
  if (selectedSide === 'buy') {
    btn.textContent = ok ? `▲ 롱 진입 실행 (${selectedSymbol})` : '거래 실행 (코어 계정)';
    btn.className = 'exec-btn buy-btn';
  } else if (selectedSide === 'sell') {
    btn.textContent = ok ? `▼ 숏 진입 실행 (${selectedSymbol})` : '거래 실행 (코어 계정)';
    btn.className = 'exec-btn sell-btn';
  }
}

// ── 이미지 처리 ──────────────────────────────────────────
function handleImageSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const dataUrl = ev.target.result;
    const mime = file.type || 'image/png';
    const b64 = dataUrl.split(',')[1];
    attachedImage = { b64, mime };
    // 프리뷰
    document.getElementById('imgPreviewBox').style.display = 'block';
    document.getElementById('imgPreviewThumb').src = dataUrl;
  };
  reader.readAsDataURL(file);
  // 파일 인풋 리셋 (같은 파일 재선택 가능)
  e.target.value = '';
}

function removeImage() {
  attachedImage = null;
  document.getElementById('imgPreviewBox').style.display = 'none';
  document.getElementById('imgPreviewThumb').src = '';
}

// ── 메시지 전송 ──────────────────────────────────────────
function handleKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text && !attachedImage) return;

  const sendBtn = document.getElementById('sendBtn');
  sendBtn.disabled = true;

  // 유저 메시지 추가
  addMessage('user', text, attachedImage ? document.getElementById('imgPreviewThumb').src : null);
  input.value = '';
  input.style.height = 'auto';

  // 이미지 캐시 후 제거
  const imgPayload = attachedImage ? {...attachedImage} : null;
  removeImage();

  // 타이핑 인디케이터
  const typingId = addTyping();

  try {
    const body = {
      session_id: SESSION_ID,
      message: text,
      symbol: selectedSymbol,
    };
    if (imgPayload) {
      body.image_b64 = imgPayload.b64;
      body.image_mime = imgPayload.mime;
    }

    const res = await fetch('/api/trade-chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    removeTyping(typingId);

    if (!res.ok) {
      const err = await res.json();
      if (err.need_api_key) {
        addMessage('assistant', '⚠️ ANTHROPIC_API_KEY가 설정되지 않았습니다. .env 파일에 키를 입력하고 서버를 재시작해 주세요.');
      } else {
        addMessage('assistant', '오류: ' + (err.error || '알 수 없는 오류'));
      }
      return;
    }

    const data = await res.json();
    addMessage('assistant', data.reply);

    // SL/TP 제안 자동 채우기
    if (data.suggestion) {
      const s = data.suggestion;
      if (s.sl) {
        document.getElementById('slInput').value = s.sl;
        document.getElementById('slInput').classList.add('sl-active');
        setTimeout(() => document.getElementById('slInput').classList.remove('sl-active'), 2000);
      }
      if (s.tp) {
        document.getElementById('tpInput').value = s.tp;
        document.getElementById('tpInput').classList.add('tp-active');
        setTimeout(() => document.getElementById('tpInput').classList.remove('tp-active'), 2000);
      }
      if (s.side && !selectedSide) {
        selectSide(s.side);
      }
      if (s.sl || s.tp) {
        document.getElementById('suggestionNote').textContent = '✦ AI 제안 반영됨';
        updateRR();
      }
    }

  } catch (err) {
    removeTyping(typingId);
    addMessage('assistant', '연결 오류가 발생했습니다: ' + err.message);
  } finally {
    sendBtn.disabled = false;
    document.getElementById('chatInput').focus();
  }
}

// ── 메시지 DOM 추가 ──────────────────────────────────────
function addMessage(role, text, imgSrc) {
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'msg ' + role;

  const avatarText = role === 'user' ? '나' : '아';
  let content = '';
  if (imgSrc) {
    content += `<img class="img-preview" src="${imgSrc}">`;
  }
  // 간단 마크다운: **bold**, *em*, SL/TP 숫자 강조
  const formatted = formatText(text);
  content += formatted;

  div.innerHTML = `
    <div class="avatar">${avatarText}</div>
    <div class="bubble">${content}</div>
  `;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return div;
}

function formatText(text) {
  if (!text) return '';
  // XSS 방지
  let s = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // **bold**
  s = s.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  // 숫자 레벨 강조 (SL/TP 주변)
  s = s.replace(/(SL|TP|손절|익절)[:\s]*(\d[\d,]*\.?\d*)/g,
    (m,k,v) => `<em>${k}</em>: <strong>${v}</strong>`);
  return s;
}

let typingCount = 0;
function addTyping() {
  const id = 'typing_' + (++typingCount);
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.id = id;
  div.innerHTML = `
    <div class="avatar">아</div>
    <div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>
  `;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return id;
}

function removeTyping(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

// ── 거래 실행 ────────────────────────────────────────────
async function executeTrade() {
  const sl = parseFloat(document.getElementById('slInput').value);
  const tp = parseFloat(document.getElementById('tpInput').value);
  if (!sl || !tp || !selectedSide) { showToast('SL, TP, 방향을 모두 설정해 주세요.', 'error'); return; }

  const confirmed = confirm(
    `[거래 확인]\n\n` +
    `심볼: ${selectedSymbol}\n` +
    `방향: ${selectedSide === 'buy' ? '▲ 롱 (매수)' : '▼ 숏 (매도)'}\n` +
    `SL: ${sl}\n` +
    `TP: ${tp}\n\n` +
    `코어 계정으로 실제 주문을 실행합니다. 계속하시겠습니까?`
  );
  if (!confirmed) return;

  document.getElementById('execBtn').disabled = true;
  document.getElementById('execBtn').textContent = '주문 중...';

  try {
    const res = await fetch('/api/trade-execute', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        passphrase: PASSPHRASE,
        symbol: selectedSymbol,
        side: selectedSide,
        sl, tp,
        session_id: SESSION_ID,
      }),
    });
    const data = await res.json();
    if (data.success) {
      showToast('✅ 진입 완료!', 'success');
      addMessage('assistant', data.message);
      setTimeout(refreshPosition, 2000);
    } else {
      showToast('❌ ' + data.message, 'error');
    }
  } catch (err) {
    showToast('연결 오류: ' + err.message, 'error');
  } finally {
    updateExecBtn();
  }
}

// ── 포지션 청산 ──────────────────────────────────────────
async function closePosition() {
  const confirmed = confirm(`${selectedSymbol} 포지션을 청산하시겠습니까?`);
  if (!confirmed) return;

  try {
    const res = await fetch('/api/trade-close', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ passphrase: PASSPHRASE, symbol: selectedSymbol, session_id: SESSION_ID }),
    });
    const data = await res.json();
    if (data.success) {
      showToast('✅ 청산 완료!', 'success');
      addMessage('assistant', data.message);
      setTimeout(refreshPosition, 2000);
    } else {
      showToast('❌ ' + data.message, 'error');
    }
  } catch (err) {
    showToast('연결 오류: ' + err.message, 'error');
  }
}

// ── 포지션 새로고침 ───────────────────────────────────────
async function refreshPosition() {
  try {
    const res = await fetch(`/api/trade-position?symbol=${encodeURIComponent(selectedSymbol)}`);
    const data = await res.json();
    const pos = data.position;
    const box = document.getElementById('positionDisplay');
    const closeBtn = document.getElementById('closeBtn');

    if (!pos) {
      box.innerHTML = '<div class="no-pos">포지션 없음</div>';
      closeBtn.style.display = 'none';
      hasPosition = false;
      return;
    }

    hasPosition = true;
    closeBtn.style.display = 'block';

    const side = pos.side.toLowerCase();
    const pnl = pos.unrealized_pnl;
    const pnlClass = pnl >= 0 ? 'pos' : 'neg';
    const pnlSign = pnl >= 0 ? '+' : '';
    const price = pos.current_price || 0;

    box.innerHTML = `
      <div class="pos-card">
        <div class="pos-header">
          <strong style="font-size:13px">${selectedSymbol}</strong>
          <span class="pos-badge ${side === 'long' ? 'long' : 'short'}">${side === 'long' ? '▲ 롱' : '▼ 숏'}</span>
        </div>
        <div class="pos-row"><span class="key">진입가</span><span class="val">${pos.entry_price.toLocaleString()}</span></div>
        <div class="pos-row"><span class="key">현재가</span><span class="val">${price ? price.toLocaleString() : '-'}</span></div>
        <div class="pos-row"><span class="key">수량</span><span class="val">${pos.size}</span></div>
        <div class="pos-row"><span class="key">레버리지</span><span class="val">${pos.leverage}x</span></div>
        <div class="pos-row"><span class="key">미실현 손익</span>
          <span class="val pos-pnl ${pnlClass}">${pnlSign}${pnl.toFixed(2)} USDT</span>
        </div>
        <div class="pos-row"><span class="key">수익률</span>
          <span class="val pos-pnl ${pnlClass}">${pnlSign}${pos.percentage.toFixed(2)}%</span>
        </div>
      </div>
    `;
  } catch (err) {
    // 조용히 무시
  }
}

// ── 세션 초기화 ──────────────────────────────────────────
async function resetSession() {
  if (!confirm('대화 히스토리를 초기화하시겠습니까?')) return;
  await fetch('/api/trade-reset', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ session_id: SESSION_ID }),
  });
  document.getElementById('chatMessages').innerHTML = '';
  addMessage('assistant', '대화가 초기화되었습니다. 새로운 분석을 시작해 주세요.');
  showToast('초기화 완료', 'success');
}

// ── 토스트 ───────────────────────────────────────────────
let toastTimer;
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + (type || '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = ''; }, 3500);
}

// ── 초기화 ───────────────────────────────────────────────
refreshPosition();
setInterval(refreshPosition, 15000);  // 15초마다 포지션 갱신
</script>
